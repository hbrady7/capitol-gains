name: execute (market open)

# Market-open execution: run the latest decision through the compliance desk and
# place it via the adapter chosen by paper_mode. Paper by default — nothing real
# is placed until a human flips paper_mode off in the dashboard.
on:
  # Scheduled morning run disabled — trigger manually from the Actions tab.
  workflow_dispatch: {}

concurrency:
  group: brain
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Free decision brain (default); Anthropic optional (LLM_PROVIDER=anthropic)
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      QUOTE_SOURCE_URL: ${{ secrets.QUOTE_SOURCE_URL }}
      # Live broker creds — only used when paper_mode is off (set in the dashboard).
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
      ROBINHOOD_AGENTIC_HEADLESS_CONFIRMED: ${{ secrets.ROBINHOOD_AGENTIC_HEADLESS_CONFIRMED }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - name: execute (compliance desk + place)
        run: npm run execute
      - name: exits (protective stops + LLM thesis exits)
        run: npm run exits
      - name: attribute (learning loop — closed trades → actor quality)
        run: npm run attribute
      - name: snapshot baselines (LLM / SPY / naive)
        run: npm run baselines
      - name: morning briefing (LLM-narrated digest)
        run: npm run brief
